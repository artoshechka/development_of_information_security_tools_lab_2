name: Static and Dynamic Analysis

on:
  workflow_dispatch:

jobs:
  valgrind:
    name: Valgrind
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools and Valgrind
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ make valgrind

      - name: Clone Allocator dependency
        run: |
          if [ ! -d "Allocator" ]; then
            git clone --depth 1 https://github.com/endurodave/Allocator.git Allocator
          fi

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DALLOCATOR_DIR=${{ github.workspace }}/Allocator

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run Valgrind on all test cases and strategies
        run: |
          mkdir -p build/valgrind-reports
          STRATEGIES=("min-dont-care" "first-free")
          FAILED=0
          
          for pla_file in SatExamples/*.pla; do
            filename=$(basename "$pla_file")
            for strategy in "${STRATEGIES[@]}"; do
              report_file="build/valgrind-reports/${filename%.*}_${strategy}.json"
              echo "Testing: $pla_file with strategy $strategy"
              
              valgrind \
                --leak-check=full \
                --show-leak-kinds=all \
                --track-origins=yes \
                --json=yes \
                --json-file="$report_file" \
                --error-exitcode=1 \
                ./build/development_of_information_security_tools_lab_2 \
                "$pla_file" \
                "$strategy" || FAILED=1
            done
          done
          
          exit $FAILED

      - name: Aggregate Valgrind JSON reports
        if: always()
        run: |
          sudo apt-get install -y jq
          
          # Create array of all reports
          jq -s '{total_tests: length, timestamp: now, reports: .}' \
            build/valgrind-reports/*.json > build/valgrind-combined.json || echo '{"total_tests": 0, "reports": []}' > build/valgrind-combined.json
          
          # Generate summary markdown
          echo "# Valgrind Test Results" > build/valgrind-summary.md
          echo "" >> build/valgrind-summary.md
          echo "## Test Coverage" >> build/valgrind-summary.md
          echo "Total test cases: $(find build/valgrind-reports -name '*.json' | wc -l)" >> build/valgrind-summary.md
          echo "" >> build/valgrind-summary.md
          echo "## Individual Reports" >> build/valgrind-summary.md
          for report in build/valgrind-reports/*.json; do
            if [ -f "$report" ]; then
              name=$(basename "$report")
              echo "- [$name]($name)" >> build/valgrind-summary.md
            fi
          done
          echo "" >> build/valgrind-summary.md
          echo "## Combined Report" >> build/valgrind-summary.md
          echo "- [valgrind-combined.json](valgrind-combined.json)" >> build/valgrind-summary.md

      - name: Upload Valgrind reports and combined JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: valgrind-reports
          path: |
            build/valgrind-reports/
            build/valgrind-combined.json
          retention-days: 30

      - name: Upload Valgrind summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: valgrind-summary
          path: build/valgrind-summary.md
          retention-days: 30