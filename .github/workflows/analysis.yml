name: Static and Dynamic Analysis

on:
  workflow_dispatch:

jobs:
  valgrind:
    name: Valgrind
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools and Valgrind
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ make valgrind

      - name: Clone Allocator dependency
        run: |
          if [ ! -d "Allocator" ]; then
            git clone --depth 1 https://github.com/endurodave/Allocator.git Allocator
          fi

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DALLOCATOR_DIR=${{ github.workspace }}/Allocator

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run Valgrind on all test cases and strategies
        run: |
          mkdir -p scan_reports/valgrind
          STRATEGIES=("min-dont-care" "first-free")
          FAILED=0
          
          for pla_file in SatExamples/*.pla; do
            filename=$(basename "$pla_file")
            for strategy in "${STRATEGIES[@]}"; do
              report_file="scan_reports/valgrind/${filename%.*}_${strategy}.json"
              echo "Testing: $pla_file with strategy $strategy"
              
              valgrind \
                --leak-check=full \
                --show-leak-kinds=all \
                --track-origins=yes \
                --json=yes \
                --json-file="$report_file" \
                --error-exitcode=1 \
                ./build/development_of_information_security_tools_lab_2 \
                "$pla_file" \
                "$strategy" || FAILED=1
            done
          done
          
          exit $FAILED

      - name: Aggregate Valgrind JSON reports
        if: always()
        run: |
          sudo apt-get install -y jq
          
          # Create array of all reports
          jq -s '{total_tests: length, timestamp: now, reports: .}' \
            scan_reports/valgrind/*.json > scan_reports/valgrind-combined.json || echo '{"total_tests": 0, "reports": []}' > scan_reports/valgrind-combined.json
          
          # Generate summary markdown
          echo "# Valgrind Test Results" > scan_reports/VALGRIND_REPORT.md
          echo "" >> scan_reports/VALGRIND_REPORT.md
          echo "**Generated:** $(date -u)" >> scan_reports/VALGRIND_REPORT.md
          echo "" >> scan_reports/VALGRIND_REPORT.md
          echo "## Test Coverage" >> scan_reports/VALGRIND_REPORT.md
          echo "Total test cases: $(find scan_reports/valgrind -name '*.json' | wc -l)" >> scan_reports/VALGRIND_REPORT.md
          echo "" >> scan_reports/VALGRIND_REPORT.md
          echo "## Individual Reports" >> scan_reports/VALGRIND_REPORT.md
          for report in scan_reports/valgrind/*.json; do
            if [ -f "$report" ]; then
              name=$(basename "$report")
              echo "- [valgrind/$name](valgrind/$name)" >> scan_reports/VALGRIND_REPORT.md
            fi
          done
          echo "" >> scan_reports/VALGRIND_REPORT.md
          echo "## Combined Report" >> scan_reports/VALGRIND_REPORT.md
          echo "- [valgrind-combined.json](valgrind-combined.json)" >> scan_reports/VALGRIND_REPORT.md

      - name: Commit Valgrind results to repository
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scan_reports/valgrind/ scan_reports/valgrind-combined.json scan_reports/VALGRIND_REPORT.md
          git commit -m "ci: update valgrind analysis results" || echo "No changes to commit"
          git push || echo "Push failed or no changes"

      - name: Upload Valgrind reports to artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: valgrind-reports
          path: scan_reports/
          retention-days: 30