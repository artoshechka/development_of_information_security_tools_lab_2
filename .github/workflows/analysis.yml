name: Static and Dynamic Analysis

on:
  workflow_dispatch:

jobs:
  valgrind:
    name: Valgrind
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools and Valgrind
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ make valgrind

      - name: Clone Allocator dependency
        run: |
          if [ ! -d "Allocator" ]; then
            git clone --depth 1 https://github.com/endurodave/Allocator.git Allocator
          fi

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DALLOCATOR_DIR=${{ github.workspace }}/Allocator

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run Valgrind on all test cases and strategies
        run: |
          mkdir -p scan_reports/valgrind
          STRATEGIES=("min-dont-care" "first-free")
          FAILED=0
          
          for pla_file in SatExamples/*.pla; do
            filename=$(basename "$pla_file")
            for strategy in "${STRATEGIES[@]}"; do
              report_file="scan_reports/valgrind/${filename%.*}_${strategy}.xml"
              echo "Testing: $pla_file with strategy $strategy"
              
              valgrind \
                --leak-check=full \
                --show-leak-kinds=all \
                --track-origins=yes \
                --xml=yes \
                --xml-file="$report_file" \
                --error-exitcode=1 \
                ./build/development_of_information_security_tools_lab_2 \
                "$pla_file" \
                --strategy="$strategy" || FAILED=1
            done
          done
          
          exit $FAILED

      - name: Aggregate Valgrind reports
        if: always()
        run: |
          sudo apt-get install -y xmlstarlet
          
          # Generate summary markdown from XML reports
          echo "# Valgrind Test Results" > scan_reports/VALGRIND_REPORT.md
          echo "" >> scan_reports/VALGRIND_REPORT.md
          echo "**Generated:** $(date -u)" >> scan_reports/VALGRIND_REPORT.md
          echo "" >> scan_reports/VALGRIND_REPORT.md
          echo "## Test Coverage" >> scan_reports/VALGRIND_REPORT.md
          echo "Total test cases: $(find scan_reports/valgrind -name '*.xml' | wc -l)" >> scan_reports/VALGRIND_REPORT.md
          echo "" >> scan_reports/VALGRIND_REPORT.md
          echo "## Individual Reports" >> scan_reports/VALGRIND_REPORT.md
          for report in scan_reports/valgrind/*.xml; do
            if [ -f "$report" ]; then
              name=$(basename "$report")
              # Extract error count from XML
              errors=$(xmlstarlet sel -t -v "count(//error)" "$report" 2>/dev/null || echo "0")
              echo "- [valgrind/$name](valgrind/$name) - $errors errors" >> scan_reports/VALGRIND_REPORT.md
            fi
          done

      - name: Commit Valgrind results to repository
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scan_reports/valgrind/ scan_reports/VALGRIND_REPORT.md
          git commit -m "ci: update valgrind analysis results" || echo "No changes to commit"
          git push origin HEAD || echo "No changes to push"

      - name: Upload Valgrind reports to artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: valgrind-reports
          path: scan_reports/
          retention-days: 30