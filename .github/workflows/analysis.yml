name: Static and Dynamic Analysis

on:
  workflow_dispatch:

jobs:
  valgrind:
    name: Valgrind
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools and Valgrind
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ make valgrind openjdk-17-jre

      - name: Clone Allocator dependency
        run: |
          if [ ! -d "Allocator" ]; then
            git clone --depth 1 https://github.com/endurodave/Allocator.git Allocator
          fi

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DALLOCATOR_DIR=${{ github.workspace }}/Allocator

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run Valgrind on all test cases and strategies
        run: |
          mkdir -p scan_reports/valgrind
          STRATEGIES=("min-dont-care" "first-free")
          FAILED=0
          
          for pla_file in SatExamples/*.pla; do
            filename=$(basename "$pla_file")
            for strategy in "${STRATEGIES[@]}"; do
              report_file="scan_reports/valgrind/${filename%.*}_${strategy}.xml"
              echo "Testing: $pla_file with strategy $strategy"
              
              valgrind \
                --leak-check=full \
                --show-leak-kinds=all \
                --track-origins=yes \
                --xml=yes \
                --xml-file="$report_file" \
                --error-exitcode=1 \
                ./build/development_of_information_security_tools_lab_2 \
                "$pla_file" \
                --strategy="$strategy" || FAILED=1
            done
          done
          
          exit $FAILED

      - name: Build merged Valgrind HTML report
        if: always()
        run: |
          curl -L -o /tmp/parsegrind.jar https://github.com/cryptid-org/parsegrind/releases/download/v1.1.3/parsegrind-cli-1.1.3.jar
          java -jar /tmp/parsegrind.jar \
            --base-directory=. \
            --source-glob='**/*.cpp' \
            --source-glob='**/*.h' \
            --valgrind-glob='scan_reports/valgrind/**/*.xml' \
            --output=scan_reports/valgrind_report.html

      - name: Upload Valgrind reports to artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: valgrind-report
          path: scan_reports/valgrind_report.html
          retention-days: 30