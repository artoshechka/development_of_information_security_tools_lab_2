name: Static and Dynamic Analysis

on:
  workflow_dispatch:

jobs:
  valgrind:
    name: Valgrind
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools and Valgrind
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ make valgrind

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run Valgrind
        run: |
          valgrind \
            --leak-check=full \
            --show-leak-kinds=all \
            --track-origins=yes \
            --error-exitcode=1 \
            ./build/development_of_information_security_tools_lab_2 \
            ./SatExamples/sat_ex_1.pla \
            min-dont-care \
            2>&1 | tee build/valgrind.log

      - name: Upload Valgrind log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: valgrind-log
          path: build/valgrind.log

  pvs-studio:
    name: PVS-Studio
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check PVS-Studio credentials
        id: pvs_credentials
        env:
          PVS_STUDIO_USERNAME: ${{ secrets.PVS_STUDIO_USERNAME }}
          PVS_STUDIO_KEY: ${{ secrets.PVS_STUDIO_KEY }}
        run: |
          if [ -n "$PVS_STUDIO_USERNAME" ] && [ -n "$PVS_STUDIO_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install build tools
        if: ${{ steps.pvs_credentials.outputs.enabled == 'true' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ make wget gnupg software-properties-common

      - name: Install PVS-Studio
        if: ${{ steps.pvs_credentials.outputs.enabled == 'true' }}
        run: |
          wget -q -O - https://files.viva64.com/etc/pubkey.txt | sudo apt-key add -
          sudo wget -q -O /etc/apt/sources.list.d/viva64.list https://files.viva64.com/etc/viva64.list
          sudo apt-get update
          sudo apt-get install -y pvs-studio

      - name: Configure CMake
        if: ${{ steps.pvs_credentials.outputs.enabled == 'true' }}
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build
        if: ${{ steps.pvs_credentials.outputs.enabled == 'true' }}
        run: cmake --build build -j$(nproc)

      - name: Set PVS-Studio credentials
        if: ${{ steps.pvs_credentials.outputs.enabled == 'true' }}
        env:
          PVS_STUDIO_USERNAME: ${{ secrets.PVS_STUDIO_USERNAME }}
          PVS_STUDIO_KEY: ${{ secrets.PVS_STUDIO_KEY }}
        run: pvs-studio-analyzer credentials "$PVS_STUDIO_USERNAME" "$PVS_STUDIO_KEY"

      - name: Run PVS-Studio analysis
        if: ${{ steps.pvs_credentials.outputs.enabled == 'true' }}
        run: |
          pvs-studio-analyzer analyze \
            -f build/compile_commands.json \
            -j "$(nproc)" \
            -o build/pvs.log

      - name: Convert report
        if: ${{ steps.pvs_credentials.outputs.enabled == 'true' }}
        run: |
          plog-converter \
            -a GA:1,2 \
            -t fullhtml \
            -o build/pvs-report \
            build/pvs.log

      - name: Upload PVS-Studio artifacts
        if: ${{ always() && steps.pvs_credentials.outputs.enabled == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: pvs-studio-report
          path: |
            build/pvs.log
            build/pvs-report
