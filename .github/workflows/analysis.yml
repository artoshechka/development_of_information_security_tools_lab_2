name: Static and Dynamic Analysis

on:
  workflow_dispatch:

jobs:
  valgrind:
    name: Valgrind
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools and Valgrind
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ make valgrind

      - name: Clone Allocator dependency
        run: |
          if [ ! -d "Allocator" ]; then
            git clone --depth 1 https://github.com/endurodave/Allocator.git Allocator
          fi

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DALLOCATOR_DIR=${{ github.workspace }}/Allocator

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run Valgrind for Sat_ex30_3
        run: |
          set +e
          mkdir -p scan_reports/valgrind
          valgrind \
            --leak-check=full \
            --show-leak-kinds=all \
            --track-origins=yes \
            --xml=yes \
            --xml-file="scan_reports/valgrind/Sat_ex30_3_min-dont-care.xml" \
            --error-exitcode=1 \
            ./build/development_of_information_security_tools_lab_2 \
            "SatExamples/Sat_ex30_3.pla" \
            --strategy="min-dont-care" || true

      - name: Convert Valgrind XML to HTML
        if: always()
        run: |
          mkdir -p /tmp/valgrind_30_3
          cp scan_reports/valgrind/Sat_ex30_3_min-dont-care.xml /tmp/valgrind_30_3/
          python3 tools/valgrind_xml_to_html.py \
            --input /tmp/valgrind_30_3 \
            --output scan_reports/valgrind

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: valgrind-report
          path: |
            scan_reports/valgrind/Sat_ex30_3_min-dont-care.xml
            scan_reports/valgrind/Sat_ex30_3_min-dont-care.html
          retention-days: 30